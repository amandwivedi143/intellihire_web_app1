spring.application.name=Resume-analyser

# Debug security decisions in dev (helps troubleshoot OAuth)
# logging.level.org.springframework.security=DEBUG

# In dev mode, use the remote TiDB/MySQL database.
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=REDACTED_DB_USERNAME
spring.datasource.password=REDACTED_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Keep same defaults as application.properties
server.port=8080

# API / Mail / Custom Keys
apiKey=REDACTED_SENDINBLUE_API_KEY
genKey=REDACTED_GROQ_API_KEY

# OAuth2 Client Credentials (Google)
# Note: environment variables like GOOGLE_CLIENT_ID map to property keys like google.client.id
# (underscores become dots). We read those here with a safe dummy fallback.
spring.security.oauth2.client.registration.google.client-id=REDACTED_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=REDACTED_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Adzuna Credentials
application-id=REDACTED_ADZUNA_APP_ID
application-api-key=REDACTED_ADZUNA_API_KEY

